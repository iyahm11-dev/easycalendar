<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notion Weather Widget</title>
  <style>
  /* Diese Regel löst das Breiten-Problem für alle Elemente */
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    background: transparent;
    margin: 0;
    padding: 10px;
  }

  .card {
    padding: 16px;
    border-radius: 12px;
    background: #f5f5f5;
    max-width: 320px;
    /* Damit die Karte im Fenster zentriert ist, falls gewünscht: */
    margin: 0 auto; 
    border: 1px solid #e0e0e0; /* Optional: ein leichter Rand für mehr Kontur */
  }

  input {
    width: 100%;
    padding: 8px;
    border-radius: 8px;
    border: 1px solid #ccc;
    margin-bottom: 10px;
    display: block; /* Verhindert kleine Abstände unter dem Feld */
  }

  button {
    width: 100%;
    padding: 8px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    background-color: #e0e0e0; /* Ein dezentes Grau, passend zum Design */
    transition: background 0.2s;
  }

  button:hover {
    background-color: #d0d0d0; /* Kleiner Effekt beim Drüberfahren */
  }

  .weather {
    margin-top: 12px;
    font-size: 14px;
  }
</style>

</head>
<body>
  <div class="card">
    <input id="city" placeholder="Enter city (e.g. Munich)" />
    <button onclick="getWeather()">Get Weather</button>

    <div class="weather" id="output"></div>
  </div>

<script>
async function getWeather() {
  const city = document.getElementById("city").value;
  const out = document.getElementById("output");

  if (!city) {
    out.innerHTML = "Please enter a city.";
    return;
  }

  try {
    // 1. Geocoding (city → coordinates)
    const geoRes = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
    );
    const geoData = await geoRes.json();

    if (!geoData.results) {
      out.innerHTML = "City not found.";
      return;
    }

    const { latitude, longitude, name, country } = geoData.results[0];

    // 2. Weather data
    const weatherRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`
    );
    const weatherData = await weatherRes.json();

    const w = weatherData.current_weather;

    function getWeatherIcon(code) {
  if (code === 0) return `<img src="Icons/sun.png" width="90">`;
  
  if (code <= 3) return `<img src="Icons/cloud.png" width="90">`;
  
  if (code <= 48) return `<img src="Icons/fog.png" width="90">`;
  
  if (code <= 67) return `<img src="Icons/rain.png" width="90">`;
  
  if (code <= 77) return `<img src="Icons/snow.png" width="90">`;
  
  if (code >= 95) return `<img src="Icons/storm.gif" width="90">`;
  
  return `<img src="https://cdn-icons-gif.vercel.app/cloudy.gif" width="60">`;
}
   out.innerHTML = `
    <div style="display: flex; align-items: center; gap: 50px; margin-bottom: 10px;">
  <div>${getWeatherIcon(w.weathercode)}</div>
  <div>
    <b>${name}, ${country}</b><br/>
    🌡️ ${w.temperature}°C<br/>
    💨 ${w.windspeed} km/h<br/>
    ⏱️ ${w.time.replace("T"," ")}
  </div>
</div>
<div style="text-align: center; border-top: 1px solid #eee; padding-top: 5px;">
  <a href="https://flaticon.com" style="font-size: 10px; color: #888; text-decoration: none;">
    Icons by Freepik - Flaticon
  </a>
</div>


`;
  } catch (err) {
    out.innerHTML = "Error loading weather.";
  }
}
</script>
</body>
</html>
