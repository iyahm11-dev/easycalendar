<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Notion Weather Widget</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: transparent;
      margin: 0;
      padding: 10px;
    }
    .card {
      padding: 16px;
      border-radius: 12px;
      background: #f5f5f5;
      max-width: 320px;
    }
    input {
      width: 100%;
      padding: 8px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-bottom: 10px;
    }
    button {
      width: 100%;
      padding: 8px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .weather {
      margin-top: 12px;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <input id="city" placeholder="Enter city (e.g. Munich)" />
    <button onclick="getWeather()">Get Weather</button>

    <div class="weather" id="output"></div>
  </div>

<script>
async function getWeather() {
  const city = document.getElementById("city").value;
  const out = document.getElementById("output");

  if (!city) {
    out.innerHTML = "Please enter a city.";
    return;
  }

  try {
    // 1. Geocoding (city → coordinates)
    const geoRes = await fetch(
      `https://geocoding-api.open-meteo.com/v1/search?name=${city}&count=1`
    );
    const geoData = await geoRes.json();

    if (!geoData.results) {
      out.innerHTML = "City not found.";
      return;
    }

    const { latitude, longitude, name, country } = geoData.results[0];

    // 2. Weather data
    const weatherRes = await fetch(
      `https://api.open-meteo.com/v1/forecast?latitude=${latitude}&longitude=${longitude}&current_weather=true`
    );
    const weatherData = await weatherRes.json();

    const w = weatherData.current_weather;

    out.innerHTML = `
      <b>${name}, ${country}</b><br/>
      🌡️ Temp: ${w.temperature}°C<br/>
      💨 Wind: ${w.windspeed} km/h<br/>
      ⏱️ Time: ${w.time}
    `;
  } catch (err) {
    out.innerHTML = "Error loading weather.";
  }
}
</script>
</body>
</html>
